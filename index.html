<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lern- & Sprachassistent</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        /* CSS-Variablen für das Design (Standard: System/Dunkel) */
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --accent-color: #007bff;
            --input-bg: #1a1a1a;
        }

        /* Aktivierter Weißmodus */
        body.light-mode {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #f8f9fa;
            --border-color: #cccccc;
            --input-bg: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 { 
            text-align: center;
            margin-top: 0;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            box-sizing: border-box;
            border-radius: 6px;
            font-size: 16px;
            resize: vertical;
        }

        .controls, .audio-controls, .file-controls {
            margin: 20px 0;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        button, select, input[type="file"] {
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        button:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .output-box {
            margin-top: 20px;
            padding: 15px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            white-space: pre-wrap;
            min-height: 80px;
            font-size: 16px;
            line-height: 1.5;
        }

        .hidden { 
            display: none !important; 
        }

        #downloadBtn { 
            background: #28a745; 
            color: white; 
            border-color: #28a745;
        }
        
        #downloadBtn:hover {
            background: #218838;
        }

        .status-message {
            font-style: italic;
            color: #888888;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lern- & Sprachassistent</h1>
    
    <div style="text-align: right;">
        <button onclick="toggleTheme()" id="themeToggleBtn">🌓 Design wechseln (Weißmodus)</button>
    </div>

    <div class="file-controls">
        <label href="#" style="font-weight: bold;">Datei laden (.txt, .docx):</label>
        <input type="file" id="fileInput" accept=".txt,.docx" onchange="handleFileUpload(event)">
    </div>

    <div class="audio-controls">
        <button onclick="startSpeechRecognition()">🎤 Spracheingabe starten</button>
        <span id="speechStatus" class="status-message"></span>
    </div>

    <textarea id="inputText" placeholder="Füge hier deinen Text ein, lade eine Datei hoch oder nutze die Spracheingabe..."></textarea>

    <div class="controls">
        <label style="font-weight: bold;">Funktion:</label>
        <select id="modeSelect" onchange="toggleLanguageSelect()">
            <option value="summary">Zusammenfassung</option>
            <option value="explain">Für Schüler erklären</option>
            <option value="quiz">Quiz erstellen</option>
            <option value="flashcards">Lernkarten</option>
            <option value="grammar">Grammatikprüfung & Korrektur</option>
            <option value="translate">Übersetzen</option>
        </select>

        <select id="langSelect" class="hidden">
            <option value="en">Englisch</option>
            <option value="zh">Chinesisch (Mandarin)</option>
            <option value="es">Spanisch</option>
            <option value="hi">Hindi</option>
            <option value="bn">Bengalisch</option>
            <option value="pt">Portugiesisch</option>
            <option value="ru">Russisch</option>
            <option value="ja">Japanisch</option>
            <option value="pa">Panjabi</option>
            <option value="mr">Marathi</option>
            <option value="te">Telugu</option>
            <option value="wu">Wu (Chinesisch)</option>
            <option value="fr">Französisch</option>
            <option value="ko">Koreanisch</option>
            <option value="de">Deutsch</option>
        </select>

        <button onclick="processText()" style="font-weight: bold; background: var(--accent-color); color: white;">Text verarbeiten</button>
    </div>

    <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 30px 0;">

    <h2>Ergebnis:</h2>
    
    <div style="margin-bottom: 10px;">
        <button onclick="speakOutput()">🔊 Ergebnis vorlesen</button>
    </div>
    
    <div id="outputText" class="output-box">Das Ergebnis erscheint hier nach der Verarbeitung...</div>
    
    <div style="margin-top: 20px;">
        <button id="downloadBtn" class="hidden" onclick="downloadSolutions()">📥 Lösungen herunterladen (.txt)</button>
    </div>
</div>

<script>
    // --- 1. DESIGN / THEME MANAGEMENT (WEISSMODUS) ---
    // Falls im LocalStorage "light" hinterlegt ist, beim Laden direkt umschalten
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        if (document.body.classList.contains('light-mode')) {
            localStorage.setItem('theme', 'light');
        } else {
            localStorage.setItem('theme', 'dark');
        }
    }

    // Blendet das Sprach-Dropdown ein/aus, je nach Modus
    function toggleLanguageSelect() {
        const mode = document.getElementById("modeSelect").value;
        const langSelect = document.getElementById("langSelect");
        if (mode === "translate") {
            langSelect.classList.remove("hidden");
        } else {
            langSelect.classList.add("hidden");
        }
    }

    // --- 2. DATEI-INPUT FÜR TXT UND WORD (.DOCX) ---
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const fileReader = new FileReader();

        if (file.name.endsWith('.docx')) {
            fileReader.onload = function(e) {
                const arrayBuffer = e.target.result;
                mammoth.extractRawText({ arrayBuffer: arrayBuffer })
                    .then(function(result) {
                        document.getElementById("inputText").value = result.value;
                    })
                    .catch(function(err) {
                        alert("Fehler beim Lesen der Word-Datei: " + err.message);
                    });
            };
            fileReader.readAsArrayBuffer(file);
        } else if (file.name.endsWith('.txt')) {
            fileReader.onload = function(e) {
                document.getElementById("inputText").value = e.target.result;
            };
            fileReader.readAsText(file);
        } else {
            alert("Nicht unterstütztes Format! Bitte lade eine .txt oder .docx Datei hoch.");
        }
    }

    // --- 3. SPRACHEINGABE (MIKROFON-API) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'de-DE';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        function startSpeechRecognition() {
            const statusSpan = document.getElementById("speechStatus");
            statusSpan.innerText = "Ich höre zu... Bitte sprechen.";
            recognition.start();
        }

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            const textInput = document.getElementById("inputText");
            if (textInput.value.trim() === "") {
                textInput.value = transcript;
            } else {
                textInput.value += " " + transcript;
            }
            document.getElementById("speechStatus").innerText = "Sprache erfolgreich erkannt.";
        };

        recognition.onerror = function(event) {
            document.getElementById("speechStatus").innerText = "Fehler bei der Erkennung: " + event.error;
        };

        recognition.onend = function() {
            // Status nach 3 Sekunden leeren, falls kein Fehler vorliegt
            setTimeout(() => {
                const statusText = document.getElementById("speechStatus").innerText;
                if (statusText === "Ich höre zu... Bitte sprechen." || statusText === "Sprache erfolgreich erkannt.") {
                    document.getElementById("speechStatus").innerText = "";
                }
            }, 3000);
        };
    } else {
        document.getElementById("speechStatus").innerText = "Hinweis: Spracheingabe im aktuellen Browser nicht unterstützt.";
    }

    // --- 4. SPRACHAUSGABE (VORLESEN-API) ---
    function speakOutput() {
        const text = document.getElementById("outputText").innerText;
        if (!text || text.startsWith("Das Ergebnis erscheint") || text.startsWith("Lädt...")) {
            alert("Es gibt noch keinen Text zum Vorlesen!");
            return;
        }

        // Falls bereits vorgelesen wird, stoppen (Toggle-Funktion)
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
            return;
        }

        const utterance = new SpeechSynthesisUtterance(text);
        
        // Zuweisung der korrekten Vorlese-Sprache
        if (document.getElementById("modeSelect").value === "translate") {
            utterance.lang = document.getElementById("langSelect").value;
        } else {
            utterance.lang = 'de-DE';
        }

        window.speechSynthesis.speak(utterance);
    }

    // --- 5. NETZWERK-ANFRAGE ANS BACKEND ---
    let extractedSolutions = ""; // Permanenter Speicher für die Download-Datei

    async function processText() {
        const text = document.getElementById("inputText").value;
        const mode = document.getElementById("modeSelect").value;
        const targetLanguage = document.getElementById("langSelect").value;
        const outputDiv = document.getElementById("outputText");
        const downloadBtn = document.getElementById("downloadBtn");

        if (!text.trim()) {
            alert("Bitte gib einen Text ein oder lade eine gültige Datei hoch!");
            return;
        }

        outputDiv.innerText = "Verarbeite Daten... Bitte habe einen Moment Geduld.";
        downloadBtn.classList.add("hidden");
        extractedSolutions = "";

        try {
            // Absoluter Pfad zu deiner Serverless Netlify-Funktion
            const response = await fetch("/.netlify/functions/script", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ text, mode, targetLanguage })
            });

            if (!response.ok) {
                throw new Error("Server antwortete mit Status: " + response.status);
            }

            const data = await response.json();

            if (data.result) {
                outputDiv.innerText = data.result;

                // Falls der Grammatikmodus aktiv ist, separieren wir den Downloadbereich
                if (mode === "grammar" && data.result.includes("--- LÖSUNGEN ---")) {
                    const stringParts = data.result.split("--- LÖSUNGEN ---");
                    // Speichere den Text nach der Trennlinie
                    extractedSolutions = stringParts[1].trim();
                    downloadBtn.classList.remove("hidden");
                }
            } else if (data.error) {
                outputDiv.innerText = "Fehler vom Server: " + data.error;
            } else {
                outputDiv.innerText = "Ein unbekannter Verarbeitungsfehler ist aufgetreten.";
            }

        } catch (error) {
            outputDiv.innerText = "Verbindungsfehler: " + error.message + "\nStelle sicher, dass deine Serverless Function läuft.";
        }
    }

    // --- 6. DOWNLOAD DER GRAMMATIK-LÖSUNGEN ALS DATEI ---
    function downloadSolutions() {
        if (!extractedSolutions) {
            alert("Keine Lösungsdaten für den Download vorhanden.");
            return;
        }
        
        const blob = new Blob([extractedSolutions], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Grammatik_Korrektur_Loesungen.txt";
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
